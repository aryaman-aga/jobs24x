services:
  - type: web
    name: jobs24x7
    runtime: python
    repo: https://github.com/aryaman-aga/jobs24x
    plan: free
    region: ohio
    branch: main
    healthCheckPath: /health/
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py ensure_admin && python manage.py setup_social_app && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,jobs24x7.com,www.jobs24x7.com"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: jobs24x7-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: jobs24x7-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: jobs24x7-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: jobs24x7-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jobs24x7-db
          property: port
      - key: CACHE_URL
        value: ""
      - key: SESSION_ENGINE
        value: django.contrib.sessions.backends.db
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: SITE_DOMAIN
        value: jobs24x7.onrender.com
      - key: SITE_NAME
        value: Jobs24X7
      - key: SENDGRID_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SCHEDULER_ENABLED
        value: "True"
      - key: SCRAPER_SECRET_TOKEN
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

databases:
  - name: jobs24x7-db
    plan: free
    region: ohio
