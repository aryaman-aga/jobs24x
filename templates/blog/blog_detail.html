{% extends 'base.html' %}
{% block title %}{{ post.title }} - Jobs24X7{% endblock %}
{% block content %}
<section class="py-10">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <a href="{% url 'blog_list' %}" class="text-blue-400 hover:underline text-sm mb-4 inline-block transition">← Back to blog</a>
        <article class="bg-gray-800/80 rounded-2xl p-8 border border-gray-700/50">
            <h1 class="text-3xl font-bold text-white">{{ post.title }}</h1>
            <div class="mt-4 flex items-center gap-4 text-sm text-gray-500">
                <span>{{ post.published_at|date:"M d, Y" }}</span>
                <span>{{ post.read_time_min }} min read</span>
                <span>{{ post.author_name }}</span>
            </div>
            <div class="mt-8 prose prose-invert max-w-none text-gray-300 leading-relaxed">{{ post.content|linebreaks }}</div>
        </article>
    </div>
</section>
{% endblock %}
