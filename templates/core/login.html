{% extends 'base.html' %}
{% block title %}Sign In - Jobs24x{% endblock %}
{% block content %}
<section class="min-h-screen flex items-center justify-center py-16 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
            <p class="text-gray-400 mt-2">Sign in to access your saved jobs</p>
        </div>
        <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700">
            <form method="post">
                {% csrf_token %}
                {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-900/50 text-red-300 border border-red-800{% else %}bg-green-900/50 text-green-300 border border-green-800{% endif %} text-sm">{{ message }}</div>
                {% endfor %}
                {% endif %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                        <input type="email" name="username" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                        <input type="password" name="password" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Sign In</button>
                </div>
            </form>
            <p class="mt-6 text-center text-sm text-gray-400">
                Don't have an account? <a href="{% url 'signup' %}" class="text-blue-400 hover:underline">Sign Up</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
