{% extends 'base.html' %}
{% block title %}Create Alert - Jobs24x{% endblock %}
{% block content %}
<section class="py-10">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-2xl font-bold text-white">Create Job Alert</h1>
        <form method="post" class="mt-6 space-y-6 bg-gray-800/50 rounded-2xl p-8 border border-gray-700/50">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-300 mb-1">Role Keywords</label><input type="text" name="role_keywords" placeholder="e.g. Software Engineer, Backend, Frontend" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-300 mb-1">Experience Levels</label><div class="flex flex-wrap gap-2">{% for key, label in experiences %}<label class="flex items-center gap-2 text-sm text-gray-300"><input type="checkbox" name="experience_levels" value="{{ key }}" class="rounded bg-gray-700 border-gray-600 text-blue-600"> {{ label }}</label>{% endfor %}</div></div>
            <div><label class="block text-sm font-medium text-gray-300 mb-1">Categories</label><div class="flex flex-wrap gap-2">{% for key, label in categories %}<label class="flex items-center gap-2 text-sm text-gray-300"><input type="checkbox" name="categories" value="{{ key }}" class="rounded bg-gray-700 border-gray-600 text-blue-600"> {{ label }}</label>{% endfor %}</div></div>
            <div><label class="flex items-center gap-2 text-sm text-gray-300"><input type="checkbox" name="remote_only" checked class="rounded bg-gray-700 border-gray-600 text-blue-600"> Remote only</label></div>
            <div><label class="block text-sm font-medium text-gray-300 mb-1">Minimum Salary (USD)</label><input type="number" name="min_salary" placeholder="e.g. 50000" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 outline-none"></div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Create Alert</button>
        </form>
    </div>
</section>
{% endblock %}
