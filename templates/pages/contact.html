{% extends 'base.html' %}
{% block title %}Contact - Jobs24X7{% endblock %}
{% block content %}
<section class="py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-white">Contact Us</h1>
        <p class="text-gray-400 mt-2">Have a question or feedback? We'd love to hear from you.</p>
        <div class="mt-8 bg-gray-800/50 rounded-2xl p-8 border border-gray-700/50">
            <form method="post">
                {% csrf_token %}
                {% if messages %}
                {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg {% if message.tags == 'error' %}bg-red-900/50 text-red-300{% else %}bg-green-900/50 text-green-300{% endif %} text-sm">{{ message }}</div>
                {% endfor %}
                {% endif %}
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium text-gray-300 mb-1">Name</label><input type="text" name="name" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-300 mb-1">Email</label><input type="email" name="email" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-600 outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-300 mb-1">Message</label><textarea name="message" rows="5" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-600 outline-none"></textarea></div>
                    <button type="submit" class="bg-blue-700 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-800 transition">Send Message</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
