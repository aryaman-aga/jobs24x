<section class="py-16 bg-gray-900/30 scroll-reveal">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white">Opportunities Across 60+ Countries</h2>
            <p class="text-gray-400 mt-2">We curate remote jobs and international tech roles across the globe, with a strong focus on <span class="text-blue-500 font-semibold">India</span>, the US, UK, Europe, Canada, Singapore and Australia.</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 max-w-4xl mx-auto">
            {% for c in countries %}
            <div class="bg-gray-800/50 rounded-xl p-4 border border-gray-700/50 text-center hover:border-blue-600/30 transition-all duration-300 hover:-translate-y-1 {% if c.highlight %}ring-2 ring-orange-500 border-orange-500/50{% endif %}">
                <span class="text-3xl">{{ c.flag }}</span>
                <h3 class="font-semibold text-white text-sm mt-2">{{ c.name }}</h3>
                <p class="text-xs text-gray-400 mt-1">{{ c.count }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
