version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: jobs24x
      POSTGRES_USER: jobs24x
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    restart: unless-stopped

  web:
    build: .
    command: gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 2 --threads 4
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: jobs24x
      DB_USER: jobs24x
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings_prod
    depends_on:
      - db
    restart: unless-stopped

  cron:
    build: .
    command: python manage.py daily_refresh
    env_file:
      - .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: jobs24x
      DB_USER: jobs24x
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings_prod
    depends_on:
      - db
    restart: unless-stopped
    profiles:
      - cron
    # In production, this would be triggered by a cron job instead

volumes:
  postgres_data:
